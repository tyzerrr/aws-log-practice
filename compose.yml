services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: aws-log-practice
      POSTGRES_PASSWORD: aws-log-practice
      POSTGRES_DB: aws-log-practice
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aws-log-practice -d aws-log-practice"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - aws-log-practice-pgdata:/var/lib/postgresql/data

volumes:
  aws-log-practice-pgdata:
