version: "2"
sql:
  - engine: "postgresql"
    schema: "db/schema.sql"
    queries: "db/query"
    gen:
      go:
        package: "sqlc"
        out: "server/internal/adapter/db/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "pg_catalog.int4"
            go_type: "int64"
