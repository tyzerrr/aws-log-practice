name: build-and-push-container-image.yml
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read

jobs:
  build-and-push-container-image:
    runs-on: ubuntu-latest
    steps:
      - shell: bash
      - id: Checkout
        uses: actions/checkout@v6
      - name: Get image tag
        id: get-image-tag
        run: |
          SHORT_COMMIT_ID=`git rev-parse --short HEAD`
          TIMESTAMP=$(date)
          image-tag="${SHORT_COMMIT_ID}-${TIMESTAMP}" >> $GITHUB_OUTPUT
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.IAM_ARN_TO_PUSH_CONTAINER_IMAGE }}
          aws-region: "ap-northeast-1"
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: "true"
      - name: Build and push image to Amazon ECR
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/aws-log-practice-${{ steps.get-image-tag.outputs.image-tag }}