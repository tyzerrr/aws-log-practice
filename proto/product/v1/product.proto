syntax = "proto3";

package product.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tyzerrr/aws-log-practice/server/gen/product/v1";

service ProductService {
  rpc RegisterProduct(RegisterProductRequest) returns (RegisterProductResponse);
  rpc GetActiveProductsCount(GetActiveProductsCountRequest) returns (GetActiveProductsCountResponse);
  rpc ListActiveProducts(ListActiveProductsRequest) returns (ListActiveProductsResponse);
}

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  int32 price_amount = 4;
  string currency_code = 5;
  bool is_active = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message ProductInput {
  string name = 1;
  string description = 2;
  int64 price_amount = 3;
  string currency_code = 4;
  bool is_active = 5;
}

message RegisterProductRequest {
  ProductInput product = 1;
}

message RegisterProductResponse {
  Product product = 1;
}

message GetActiveProductsCountRequest {}

message GetActiveProductsCountResponse {
  int64 counts = 1;
}


message ListActiveProductsRequest {}

message ListActiveProductsResponse {
  repeated Product products = 1;
}
